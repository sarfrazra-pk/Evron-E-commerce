kind = "web"
previewPath = "/"
title = "Evron"
version = "1.0.0"
id = "artifacts/evron"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18150

[services.development]
run = "pnpm --filter @workspace/evron run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/evron", "run", "build" ]
publicDir = "artifacts/evron/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18150"
BASE_PATH = "/"
